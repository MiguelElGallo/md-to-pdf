name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1. Use dry-run to build artifacts without publishing."
        required: true
        default: dry-run
        type: string
      allow_unsigned_macos:
        description: "Allow publishing without Apple Developer ID signing/notarization."
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ inputs.tag || github.sha }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: md-to-pdf

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      version: ${{ steps.plan.outputs.version }}
      ref: ${{ steps.plan.outputs.ref }}
      publishing: ${{ steps.plan.outputs.publishing }}
      macos_signing: ${{ steps.plan.outputs.macos_signing }}
      allow_unsigned_macos: ${{ steps.plan.outputs.allow_unsigned_macos }}
    steps:
      - name: Determine release mode
        id: plan
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          allow_unsigned_macos="${{ inputs.allow_unsigned_macos || false }}"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            allow_unsigned_macos="false"
          else
            tag="${{ inputs.tag }}"
          fi

          publishing=false
          ref="${GITHUB_SHA}"
          version="dry-run"
          if [[ "$tag" != "dry-run" ]]; then
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tag must look like v0.1.1 or v0.1.1-rc.1"
              exit 1
            fi
            publishing=true
            version="${tag#v}"
            ref="refs/tags/$tag"
          fi

          macos_signing=false
          if [[ -n "$APPLE_CERTIFICATE_P12_BASE64" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_DEVELOPER_IDENTITY" && -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            macos_signing=true
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "ref=$ref"
            echo "publishing=$publishing"
            echo "macos_signing=$macos_signing"
            echo "allow_unsigned_macos=$allow_unsigned_macos"
          } >> "$GITHUB_OUTPUT"

  validate-release:
    name: Validate release
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.plan.outputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate Cargo version matches tag
        if: ${{ needs.plan.outputs.publishing == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cargo_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "md-to-pdf") | .version')
          if [[ "$cargo_version" != "${{ needs.plan.outputs.version }}" ]]; then
            echo "Cargo.toml version $cargo_version does not match tag ${{ needs.plan.outputs.tag }}"
            exit 1
          fi

      - name: Validate macOS signing policy
        if: ${{ needs.plan.outputs.publishing == 'true' && needs.plan.outputs.macos_signing != 'true' && needs.plan.outputs.allow_unsigned_macos != 'true' }}
        shell: bash
        run: |
          echo "Publishing without signed/notarized macOS artifacts is disabled."
          echo "Configure Apple signing secrets, or manually dispatch with allow_unsigned_macos=true for an explicitly unsigned release."
          exit 1

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

      - name: Run release checks
        run: |
          cargo fmt --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked
          uv run --locked --group docs zensical build --clean --strict

  build:
    name: Build ${{ matrix.target }}
    needs:
      - plan
      - validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: md-to-pdf
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: zip
            binary: md-to-pdf
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: zip
            binary: md-to-pdf
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: md-to-pdf.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.plan.outputs.ref }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Import Developer ID certificate
        if: ${{ runner.os == 'macOS' && needs.plan.outputs.macos_signing == 'true' }}
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/md-to-pdf-signing.keychain-db"
          cert="$RUNNER_TEMP/developer-id.p12"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$cert"
          security create-keychain -p "" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "" "$keychain"
          security import "$cert" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$keychain"

      - name: Sign macOS binary
        if: ${{ runner.os == 'macOS' && needs.plan.outputs.macos_signing == 'true' }}
        shell: bash
        env:
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${BIN_NAME}"
          codesign --force --options runtime --timestamp --sign "$APPLE_DEVELOPER_IDENTITY" "$binary"
          codesign -vvv --strict "$binary"
          codesign -dvv "$binary"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          staging="target/distrib/${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp README.md LICENSE "$staging/"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$staging/"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            powershell.exe -NoProfile -Command "Compress-Archive -Path 'target/distrib/${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}' -DestinationPath 'target/distrib/${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.zip' -Force"
          elif [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd target/distrib && zip -r "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.zip" "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}")
          else
            chmod +x "$staging/${{ matrix.binary }}"
            tar -czf "target/distrib/${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.tar.gz" -C target/distrib "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}"
          fi

      - name: Notarize macOS archive
        if: ${{ runner.os == 'macOS' && needs.plan.outputs.macos_signing == 'true' }}
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          archive="target/distrib/${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.zip"
          xcrun notarytool submit "$archive" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Verify signed macOS binary
        if: ${{ runner.os == 'macOS' && needs.plan.outputs.macos_signing == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          codesign -vvv --strict "target/${{ matrix.target }}/release/${BIN_NAME}"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd target/distrib
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ./*.${{ matrix.archive }} > "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.sha256"
          else
            shasum -a 256 ./*.${{ matrix.archive }} > "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.sha256"
          fi

      - name: Verify packaged artifact
        shell: bash
        run: |
          set -euo pipefail
          cd target/distrib
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum -c "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.sha256"
          else
            shasum -a 256 -c "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.sha256"
          fi
          verify_dir="$RUNNER_TEMP/release-verify"
          rm -rf "$verify_dir"
          mkdir -p "$verify_dir"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            powershell.exe -NoProfile -Command "Expand-Archive -Path '${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.zip' -DestinationPath '$verify_dir' -Force"
          elif [[ "${{ matrix.archive }}" == "zip" ]]; then
            unzip "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.zip" -d "$verify_dir"
          else
            tar -xzf "${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.tar.gz" -C "$verify_dir"
          fi
          binary="$verify_dir/${BIN_NAME}-${{ needs.plan.outputs.tag }}-${{ matrix.target }}/${{ matrix.binary }}"
          test -f "$binary"
          if [[ "${{ matrix.os }}" == "macos-latest" && "${{ needs.plan.outputs.macos_signing }}" == "true" ]]; then
            codesign -vvv --strict "$binary"
          fi
          "$binary" --version
          "$binary" --help

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            target/distrib/*.${{ matrix.archive }}
            target/distrib/*.sha256

  attest:
    name: Attest artifacts
    needs:
      - plan
      - build
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256

      - name: Upload attested artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-attested
          path: artifacts/*

  publish:
    name: Publish GitHub Release
    needs:
      - plan
      - validate-release
      - build
      - attest
    if: ${{ always() && needs.plan.outputs.publishing == 'true' && needs.validate-release.result == 'success' && needs.build.result == 'success' && needs.attest.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.plan.outputs.ref }}
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: artifacts-attested
          path: artifacts

      - name: Create release notes
        shell: bash
        env:
          MACOS_SIGNING: ${{ needs.plan.outputs.macos_signing }}
        run: |
          if [[ "$MACOS_SIGNING" == "true" ]]; then
            macos_status="The macOS artifacts in this release are Developer ID signed with the hardened runtime and accepted by Apple's notary service. Verify the SHA-256 checksum before running the binary."
          else
            macos_status="The macOS artifacts in this release are not Apple Developer ID signed and are not notarized because this release explicitly allowed unsigned macOS artifacts. Gatekeeper may warn on first run. Verify the SHA-256 checksum before running the binary."
          fi
          cat > "$RUNNER_TEMP/release-notes.md" <<'NOTES'
          ## md-to-pdf ${{ needs.plan.outputs.tag }}

          This release includes platform archives, SHA-256 checksum files, and GitHub artifact attestations.

          ### Changed

          - Added `--title` to set the generated HTML and PDF document title.
          - Prevented `--output` and `--keep-html` path combinations from overwriting the Markdown input or colliding with the debug HTML file.
          - Clarified installation, CI, browser discovery, and error documentation.

          ### macOS trust status

          MACOS_STATUS_PLACEHOLDER

          ### Verification

          Download the archive and matching `.sha256` file, then run `shasum -a 256 -c <file>.sha256` on macOS/Linux or `Get-FileHash` on Windows.
          NOTES
          python3 - <<'PY' "$RUNNER_TEMP/release-notes.md" "$macos_status"
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          status = sys.argv[2]
          path.write_text(path.read_text().replace("MACOS_STATUS_PLACEHOLDER", status))
          PY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.plan.outputs.tag }}
        shell: bash
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            artifacts/*

  dry-run-summary:
    name: Dry-run summary
    needs:
      - plan
      - validate-release
      - build
      - attest
    if: ${{ always() && needs.plan.outputs.publishing == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: List release artifacts
        shell: bash
        run: find artifacts -maxdepth 1 -type f -print | sort
