name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Find Chrome
        id: chrome
        shell: bash
        run: |
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          if [[ -z "$browser" ]]; then
            echo "No Chromium-family browser found"
            exit 1
          fi
          echo "path=$browser" >> "$GITHUB_OUTPUT"

      - name: Download Mermaid bundle for reproducible tests
        shell: bash
        run: |
          curl -fsSL --retry 3 -o /tmp/mermaid.min.js "https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"

      - name: Run browser smoke tests
        env:
          MD_TO_PDF_BROWSER: ${{ steps.chrome.outputs.path }}
          MD_TO_PDF_MERMAID_JS: /tmp/mermaid.min.js
        run: cargo test --locked browser_smoke -- --nocapture --test-threads=1

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build documentation
        run: uv run --locked --group docs zensical build --clean --strict

  required-checks-passed:
    name: All required jobs passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - format
      - lint
      - workflow-lint
      - test
      - browser-smoke
      - docs
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        shell: bash
        run: |
          failing=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result != "success") | "\(.key): \(.value.result)"')
          if [[ -n "$failing" ]]; then
            echo "$failing"
            exit 1
          fi
